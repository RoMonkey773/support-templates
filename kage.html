    // ---------- ФУНКЦИИ СИНЕРГИИ ----------
    function calculateSynergies() {
        const counts = { 'Эльфы': 0, 'Орки': 0, 'Звери': 0, 'Феи': 0 };
        playerDeck.forEach(card => {
            if (card.race) {
                counts[card.race] = (counts[card.race] || 0) + 1;
            }
        });
        raceCounts = counts;
        activeSynergies = { shield: 0, dmg: 0, heal: 0, energy: 0 };

        Object.keys(RACE_SYNERGIES).forEach(race => {
            const count = counts[race] || 0;
            const synergy = RACE_SYNERGIES[race];
            if (count >= 4 && synergy[4]) {
                Object.keys(synergy[4]).forEach(key => {
                    activeSynergies[key] = (activeSynergies[key] || 0) + synergy[4][key];
                });
            } else if (count >= 2 && synergy[2]) {
                Object.keys(synergy[2]).forEach(key => {
                    activeSynergies[key] = (activeSynergies[key] || 0) + synergy[2][key];
                });
            }
        });

        // Обновляем отображение
        let synText = 'Синергии: ';
        if (activeSynergies.dmg > 0) synText += `⚔+${activeSynergies.dmg} `;
        if (activeSynergies.shield > 0) synText += `🛡+${activeSynergies.shield} `;
        if (activeSynergies.heal > 0) synText += `❤+${activeSynergies.heal} `;
        if (activeSynergies.energy > 0) synText += `⚡+${activeSynergies.energy} `;
        if (synText === 'Синергии: ') synText += 'нет';
        synergyDisplay.textContent = synText;
        shopSynergyDisplay.textContent = synText;

        return activeSynergies;
    }
