<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База знаний поддержки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f7fc;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 280px;
            background: #1e293b;
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 22px;
            margin-bottom: 30px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 15px;
        }
        .theme-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: transparent;
            color: #cbd5e1;
            border: none;
            border-radius: 10px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background: #334155;
            color: white;
        }
        .theme-btn.active {
            background: #3b82f6;
            color: white;
            font-weight: bold;
        }
        .sidebar .refresh-btn {
            margin-top: auto;
            padding: 12px;
            background: #334155;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .sidebar .refresh-btn:hover {
            background: #475569;
        }
        .content {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
            background: white;
        }
        .content h1 {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 10px;
        }
        .content .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .template-card {
            background: #f8fafc;
            border-left: 5px solid #3b82f6;
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }
        .template-text {
            font-size: 15px;
            line-height: 1.6;
            color: #1e293b;
            white-space: pre-wrap;
            flex: 1;
        }
        .copy-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            height: 36px;
        }
        .copy-btn:hover {
            background: #2563eb;
        }
        .copy-btn.copied {
            background: #22c55e;
        }
        .empty-state {
            color: #94a3b8;
            font-size: 18px;
            margin-top: 50px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #64748b;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        @media (max-width: 700px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📂 Темы</h2>
        <div id="themeList">
            <div style="color:#94a3b8;padding:10px;">Загрузка...</div>
        </div>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
    </div>

    <div class="content" id="contentArea">
        <div id="themeHeader">
            <h1 id="themeTitle">Загрузка...</h1>
            <div class="subtitle" id="themeDesc">Подождите, идёт загрузка данных</div>
        </div>
        <div id="templatesContainer">
            <div class="loading">⏳ Загрузка шаблонов из Google Таблицы...</div>
        </div>
    </div>

    <script>
        // ВАША ССЫЛКА НА APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbynFsvoNtkTVPF15uX4nOZlIYppMTmBsrv17F1GqTsTHvJli5sv13sRWBUmrWJJrkO6XA/exec';

        let currentTheme = null;
        let allData = {};

        async function loadData() {
            const themeList = document.getElementById('themeList');
            const container = document.getElementById('templatesContainer');
            const title = document.getElementById('themeTitle');
            const desc = document.getElementById('themeDesc');

            themeList.innerHTML = '<div style="color:#94a3b8;padding:10px;">⏳ Загрузка...</div>';
            container.innerHTML = '<div class="loading">⏳ Загрузка шаблонов...</div>';
            title.textContent = 'Загрузка...';
            desc.textContent = 'Подождите, идёт загрузка данных';

            try {
                // 1. Запрашиваем данные
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Ошибка загрузки: ' + response.status);
                const data = await response.json(); // ← читаем JSON

                // 2. Проверяем, что данные есть
                if (!data || data.length === 0) {
                    throw new Error('В таблице нет данных');
                }

                // 3. Группируем по темам
                const newData = {};
                data.forEach(row => {
                    const topic = row.topic || 'Без темы';
                    const template = row.template || '';
                    const description = row.description || '';
                    if (!template) return;
                    if (!newData[topic]) {
                        newData[topic] = { desc: description, templates: [] };
                    }
                    if (description && !newData[topic].desc) {
                        newData[topic].desc = description;
                    }
                    newData[topic].templates.push(template);
                });

                if (Object.keys(newData).length === 0) {
                    throw new Error('Не найдено ни одной темы с шаблонами');
                }

                allData = newData;
                const themeKeys = Object.keys(allData);
                if (!currentTheme || !allData[currentTheme]) {
                    currentTheme = themeKeys[0];
                }

                renderSidebar();
                renderContent();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                themeList.innerHTML = `<div style="color:#ef4444;padding:10px;">❌ Ошибка</div>`;
                container.innerHTML = `
                    <div class="error">
                        ❌ Не удалось загрузить данные из Google Таблицы.<br>
                        Проверьте, что ссылка правильная, и таблица опубликована.<br>
                        <br><b>Подробности:</b> ${error.message}
                        <br><br>🔄 Нажмите кнопку «Обновить данные» внизу слева.
                    </div>
                `;
                title.textContent = 'Ошибка';
                desc.textContent = 'Проверьте подключение и ссылку на таблицу';
            }
        }

        function renderSidebar() {
            const container = document.getElementById('themeList');
            container.innerHTML = '';
            const keys = Object.keys(allData);
            if (keys.length === 0) {
                container.innerHTML = '<div style="color:#94a3b8;padding:10px;">Нет тем</div>';
                return;
            }
            keys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
                btn.textContent = key;
                btn.dataset.theme = key;
                btn.addEventListener('click', function() {
                    currentTheme = this.dataset.theme;
                    renderSidebar();
                    renderContent();
                });
                container.appendChild(btn);
            });
        }

        function renderContent() {
            const container = document.getElementById('templatesContainer');
            const title = document.getElementById('themeTitle');
            const desc = document.getElementById('themeDesc');

            if (!currentTheme || !allData[currentTheme]) {
                const keys = Object.keys(allData);
                if (keys.length > 0) {
                    currentTheme = keys[0];
                } else {
                    title.textContent = 'Нет данных';
                    desc.textContent = 'Загрузите данные через кнопку "Обновить данные"';
                    container.innerHTML = '<div class="empty-state">📭 Нет шаблонов для отображения</div>';
                    return;
                }
            }

            const theme = allData[currentTheme];
            title.textContent = currentTheme;
            desc.textContent = theme.desc || 'Шаблоны ответов';

            container.innerHTML = '';
            theme.templates.forEach((text) => {
                const card = document.createElement('div');
                card.className = 'template-card';

                const textDiv = document.createElement('div');
                textDiv.className = 'template-text';
                textDiv.textContent = text;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '📋 Копировать';
                copyBtn.addEventListener('click', function() {
                    navigator.clipboard.writeText(text).then(() => {
                        this.textContent = '✅ Скопировано!';
                        this.classList.add('copied');
                        setTimeout(() => {
                            this.textContent = '📋 Копировать';
                            this.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        alert('Не удалось скопировать текст.');
                    });
                });

                card.appendChild(textDiv);
                card.appendChild(copyBtn);
                container.appendChild(card);
            });
        }

        document.getElementById('refreshBtn').addEventListener('click', function() {
            this.textContent = '⏳ Загрузка...';
            loadData().finally(() => {
                this.textContent = '🔄 Обновить данные';
            });
        });

        loadData();
    </script>

</body>
</html>
