<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База знаний поддержки</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }
        /* ===== ТЕМА: ФИОЛЕТОВАЯ (по умолчанию) ===== */
        body.theme-purple {
            --bg-main: #f3e8ff;
            --bg-sidebar: #7c3aed;
            --bg-card: #ffffff;
            --text-primary: #1e1b4b;
            --text-secondary: #4c1d95;
            --text-sidebar: #ede9fe;
            --border-color: #c4b5fd;
            --shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --input-bg: #ede9fe;
        }
        body.theme-purple.dark {
            --bg-main: #1e1b4b;
            --bg-sidebar: #2e1065;
            --bg-card: #4c1d95;
            --text-primary: #ede9fe;
            --text-secondary: #c4b5fd;
            --text-sidebar: #ede9fe;
            --border-color: #5b21b6;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --input-bg: #5b21b6;
        }
        /* ===== ТЕМА: WILDBERRIES ===== */
        body.theme-wb {
            --bg-main: #f8f9fa;
            --bg-sidebar: #1a1a2e;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-sidebar: #e2e8f0;
            --border-color: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --accent: #6c3eb8;
            --accent-hover: #5a2d9e;
            --input-bg: #f1f3f5;
        }
        body.theme-wb.dark {
            --bg-main: #0f0f1a;
            --bg-sidebar: #1a1a2e;
            --bg-card: #252540;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --text-sidebar: #e2e8f0;
            --border-color: #2d2d4a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --input-bg: #2d2d4a;
        }
        /* ===== ПРИМЕНЕНИЕ ПЕРЕМЕННЫХ ===== */
        body {
            background: var(--bg-main);
            color: var(--text-primary);
        }
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
            border-right: 1px solid var(--border-color);
        }
        .sidebar h2 {
            font-size: 22px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 15px;
            color: var(--text-sidebar);
        }
        #searchInput {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        #searchInput::placeholder {
            color: var(--text-secondary);
        }
        .theme-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: transparent;
            color: var(--text-sidebar);
            border: none;
            border-radius: 10px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        .theme-btn.active {
            background: var(--accent);
            color: white;
            font-weight: bold;
        }
        .sidebar .refresh-btn {
            margin-top: auto;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: var(--text-sidebar);
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .sidebar .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        /* ===== ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ ===== */
        .theme-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .theme-switcher button {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-sidebar);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 60px;
        }
        .theme-switcher button:hover {
            background: rgba(255,255,255,0.1);
        }
        .theme-switcher button.active-switch {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: bold;
        }
        .dark-toggle {
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: transparent;
            color: var(--text-sidebar);
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .dark-toggle:hover {
            background: rgba(255,255,255,0.1);
        }
        .dark-toggle.active-dark {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
        .content {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
            background: var(--bg-main);
            transition: background 0.3s;
        }
        .content h1 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;
            transition: color 0.3s;
        }
        .content .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .template-card {
            background: var(--bg-card);
            border-left: 5px solid var(--accent);
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .template-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            flex: 1;
            transition: color 0.3s;
        }
        .template-text strong {
            color: var(--accent);
        }
        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            height: 36px;
        }
        .copy-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
        .copy-btn.copied {
            background: #22c55e;
        }
        .empty-state {
            color: var(--text-secondary);
            font-size: 18px;
            margin-top: 50px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--text-secondary);
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        @media (max-width: 700px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body class="theme-purple">

    <div class="sidebar">
        <h2>📂 Темы</h2>
        <!-- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ -->
        <div class="theme-switcher">
            <button class="active-switch" data-theme="purple">💜 Фиолет</button>
            <button data-theme="wb">🟣 WB</button>
        </div>
        <button class="dark-toggle" id="darkToggle">🌙 Ночной режим</button>
        <!-- ПОЛЕ ПОИСКА -->
        <input type="text" id="searchInput" placeholder="🔍 Поиск по шаблонам...">
        <div id="themeList">
            <div style="color:var(--text-sidebar);padding:10px;">Загрузка...</div>
        </div>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
    </div>

    <div class="content" id="contentArea">
        <div id="themeHeader">
            <h1 id="themeTitle">Загрузка...</h1>
            <div class="subtitle" id="themeDesc">Подождите, идёт загрузка данных</div>
        </div>
        <div id="templatesContainer">
            <div class="loading">⏳ Загрузка шаблонов...</div>
        </div>
    </div>

    <script>
        // ====== ССЫЛКА НА APP SCRIPT ======
        const API_URL = 'https://script.google.com/macros/s/AKfycbynFsvoNtkTVPF15uX4nOZlIYppMTmBsrv17F1GqTsTHvJli5sv13sRWBUmrWJJrkO6XA/exec?callback=?';

        let currentTheme = null;
        let allData = {};
        let searchQuery = '';

        // ====== ПЕРЕКЛЮЧЕНИЕ ТЕМ ======
        let currentColorTheme = 'purple';
        let isDark = false;

        function applyTheme() {
            const body = document.body;
            // Убираем все классы
            body.classList.remove('theme-purple', 'theme-wb', 'dark');
            // Добавляем базовую тему
            body.classList.add('theme-' + currentColorTheme);
            if (isDark) {
                body.classList.add('dark');
            }
            // Обновляем активные кнопки
            document.querySelectorAll('.theme-switcher button').forEach(btn => {
                btn.classList.toggle('active-switch', btn.dataset.theme === currentColorTheme);
            });
            document.getElementById('darkToggle').classList.toggle('active-dark', isDark);
            document.getElementById('darkToggle').textContent = isDark ? '☀️ Дневной режим' : '🌙 Ночной режим';
        }

        document.querySelectorAll('.theme-switcher button').forEach(btn => {
            btn.addEventListener('click', function() {
                currentColorTheme = this.dataset.theme;
                applyTheme();
            });
        });

        document.getElementById('darkToggle').addEventListener('click', function() {
            isDark = !isDark;
            applyTheme();
        });

        // ====== ЗАГРУЗКА ДАННЫХ ======
        async function loadData() {
            const themeList = document.getElementById('themeList');
            const container = document.getElementById('templatesContainer');
            const title = document.getElementById('themeTitle');
            const desc = document.getElementById('themeDesc');

            themeList.innerHTML = '<div style="color:var(--text-sidebar);padding:10px;">⏳ Загрузка...</div>';
            container.innerHTML = '<div class="loading">⏳ Загрузка шаблонов...</div>';
            title.textContent = 'Загрузка...';
            desc.textContent = 'Подождите, идёт загрузка данных';

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Ошибка загрузки: ' + response.status);
                const data = await response.json();

                if (!data || data.length === 0) {
                    throw new Error('В таблице нет данных');
                }

                const newData = {};
                data.forEach(row => {
                    const topic = row.topic || 'Без темы';
                    const template = row.template || '';
                    const description = row.description || '';
                    if (!template) return;
                    if (!newData[topic]) {
                        newData[topic] = { desc: description, templates: [] };
                    }
                    if (description && !newData[topic].desc) {
                        newData[topic].desc = description;
                    }
                    newData[topic].templates.push(template);
                });

                if (Object.keys(newData).length === 0) {
                    throw new Error('Не найдено ни одной темы с шаблонами');
                }

                allData = newData;
                const themeKeys = Object.keys(allData);
                if (!currentTheme || !allData[currentTheme]) {
                    currentTheme = themeKeys[0];
                }

                renderSidebar();
                renderContent();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                themeList.innerHTML = `<div style="color:#ef4444;padding:10px;">❌ Ошибка</div>`;
                container.innerHTML = `
                    <div class="error">
                        ❌ Не удалось загрузить данные.<br>
                        <b>Ошибка:</b> ${error.message}
                    </div>
                `;
                title.textContent = 'Ошибка';
                desc.textContent = 'Проверьте подключение';
            }
        }

        // ====== ОТРИСОВКА МЕНЮ ======
        function renderSidebar() {
            const container = document.getElementById('themeList');
            container.innerHTML = '';
            const keys = Object.keys(allData);
            if (keys.length === 0) {
                container.innerHTML = '<div style="color:var(--text-sidebar);padding:10px;">Нет тем</div>';
                return;
            }
            keys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
                btn.textContent = key;
                btn.dataset.theme = key;
                btn.addEventListener('click', function() {
                    currentTheme = this.dataset.theme;
                    searchQuery = '';
                    document.getElementById('searchInput').value = '';
                    renderSidebar();
                    renderContent();
                });
                container.appendChild(btn);
            });
        }

        // ====== ОТРИСОВКА ШАБЛОНОВ (С ПОИСКОМ) ======
        function renderContent() {
            const container = document.getElementById('templatesContainer');
            const title = document.getElementById('themeTitle');
            const desc = document.getElementById('themeDesc');

            if (searchQuery) {
                let allTemplates = [];
                const themeKeys = Object.keys(allData);
                themeKeys.forEach(themeKey => {
                    const theme = allData[themeKey];
                    if (theme && theme.templates) {
                        theme.templates.forEach(text => {
                            allTemplates.push({
                                theme: themeKey,
                                text: text,
                                desc: theme.desc || ''
                            });
                        });
                    }
                });

                const filtered = allTemplates.filter(item =>
                    item.text.toLowerCase().includes(searchQuery) ||
                    item.theme.toLowerCase().includes(searchQuery) ||
                    item.desc.toLowerCase().includes(searchQuery)
                );

                if (filtered.length === 0) {
                    title.textContent = '🔍 Результаты поиска';
                    desc.textContent = 'Ничего не найдено';
                    container.innerHTML = '<div class="empty-state">😕 По вашему запросу ничего не найдено</div>';
                    return;
                }

                title.textContent = '🔍 Результаты поиска';
                desc.textContent = `Найдено ${filtered.length} шаблонов`;

                container.innerHTML = '';
                filtered.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'template-card';

                    const textDiv = document.createElement('div');
                    textDiv.className = 'template-text';
                    textDiv.innerHTML = `<strong>${item.theme}</strong><br>${item.text}`;

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '📋 Копировать';
                    copyBtn.addEventListener('click', function() {
                        navigator.clipboard.writeText(item.text).then(() => {
                            this.textContent = '✅ Скопировано!';
                            this.classList.add('copied');
                            setTimeout(() => {
                                this.textContent = '📋 Копировать';
                                this.classList.remove('copied');
                            }, 2000);
                        }).catch(() => {
                            alert('Не удалось скопировать текст.');
                        });
                    });

                    card.appendChild(textDiv);
                    card.appendChild(copyBtn);
                    container.appendChild(card);
                });
                return;
            }

            // Обычный режим
            if (!currentTheme || !allData[currentTheme]) {
                const keys = Object.keys(allData);
                if (keys.length > 0) {
                    currentTheme = keys[0];
                } else {
                    title.textContent = 'Нет данных';
                    desc.textContent = 'Загрузите данные через кнопку "Обновить данные"';
                    container.innerHTML = '<div class="empty-state">📭 Нет шаблонов для отображения</div>';
                    return;
                }
            }

            const theme = allData[currentTheme];
            title.textContent = currentTheme;
            desc.textContent = theme.desc || 'Шаблоны ответов';

            container.innerHTML = '';
            if (theme && theme.templates) {
                theme.templates.forEach((text) => {
                    const card = document.createElement('div');
                    card.className = 'template-card';

                    const textDiv = document.createElement('div');
                    textDiv.className = 'template-text';
                    textDiv.textContent = text;

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '📋 Копировать';
                    copyBtn.addEventListener('click', function() {
                        navigator.clipboard.writeText(text).then(() => {
                            this.textContent = '✅ Скопировано!';
                            this.classList.add('copied');
                            setTimeout(() => {
                                this.textContent = '📋 Копировать';
                                this.classList.remove('copied');
                            }, 2000);
                        }).catch(() => {
                            alert('Не удалось скопировать текст.');
                        });
                    });

                    card.appendChild(textDiv);
                    card.appendChild(copyBtn);
                    container.appendChild(card);
                });
            }
        }

        // ====== ПОИСК ======
        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value.toLowerCase().trim();
            if (searchQuery) {
                document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            } else {
                renderSidebar();
            }
            renderContent();
        });

        // ====== ОБНОВЛЕНИЕ ======
        document.getElementById('refreshBtn').addEventListener('click', function() {
            this.textContent = '⏳ Загрузка...';
            loadData().finally(() => {
                this.textContent = '🔄 Обновить данные';
            });
        });

        // ====== ПЕРВАЯ ЗАГРУЗКА ======
        loadData();
        applyTheme();
    </script>

</body>
</html>
